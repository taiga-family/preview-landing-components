name: 🤖 Auto move new issues into Triage
on:
  issues:
    types: [opened]

jobs:
  automate-project-columns:
    runs-on: ubuntu-latest
    steps:
      - uses: taiga-family/ci/actions/setup/project@c5bcf64b54eb51e9274fa667e69cfd0d2f37adfd # v1.209.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
