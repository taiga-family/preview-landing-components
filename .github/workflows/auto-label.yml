name: 🤖 Auto label
on: pull_request_review

jobs:
  label-when-approved:
    name: Label when approved
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/setup/variables@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
      - uses: taiga-family/ci/actions/auto/label-when-approved@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
