name: 🤖 Auto label
on: pull_request_review

jobs:
  label-when-approved:
    name: Label when approved
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/setup/variables@c5bcf64b54eb51e9274fa667e69cfd0d2f37adfd # v1.209.0
      - uses: taiga-family/ci/actions/auto/label-when-approved@c5bcf64b54eb51e9274fa667e69cfd0d2f37adfd # v1.209.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
