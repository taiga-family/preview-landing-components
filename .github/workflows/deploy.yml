name: 🚀 Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/setup/variables@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
      - uses: taiga-family/ci/actions/setup/node@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
      - run: npx nx build demo --base-href /preview-landing-components/
      - uses: taiga-family/ci/actions/deploy/github-pages@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
          folder: dist/demo/browser

concurrency:
  group: deploy-${{ github.head_ref }}
  cancel-in-progress: true
