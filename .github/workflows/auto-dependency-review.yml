jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiga-family/ci/actions/security/dependency-review@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
