name: ⚙️ E2E tests
on:
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiga-family/ci/actions/setup/variables@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
      - uses: taiga-family/ci/actions/setup/node@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
      - uses: taiga-family/ci/actions/setup/playwright@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
      - run: npx nx e2e demo -- --update-snapshots
      - run: npx nx e2e demo
        continue-on-error: true
        env:
          BASE_URL: https://taiga-family.github.io/preview-landing-components/

      - uses: taiga-family/ci/actions/setup/playwright-combine-failed-screenshot@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        env:
          FAILED_SCREENSHOTS_PATH: apps/demo/e2e/tests-results

      - name: Upload artifacts / ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ./apps/demo/e2e/tests-results/**/*-retry2/**/*.diff.png
          name: ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 1

  # workaround for status checks -- check this one job instead of each individual E2E job in the matrix
  # see https://github.com/orgs/community/discussions/9141#discussioncomment-2296809
  playwright-composite-result:
    name: Playwright E2E Tests matrix result
    if: ${{ always() }}
    needs: [playwright]
    runs-on: ubuntu-latest
    steps:
      - run: |
          result="${{ needs.playwright.result }}"
          # mark as successful even if skipped
          if [[ $result == "success" || $result == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi

  result:
    name: E2E result
    needs: [playwright]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiga-family/ci/actions/setup/variables@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
      - uses: taiga-family/ci/actions/setup/node@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0

      - name: Download artifacts for Playwright
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./total/playwright
          pattern: playwright-snapshots-artifacts--*
          merge-multiple: true
      - run: ls -R ./total/playwright || echo "not found"
      - uses: taiga-family/ci/actions/setup/playwright-diff-check@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        with:
          pw-result: ./total/playwright

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
