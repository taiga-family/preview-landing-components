name: 🤖 Auto cleanup caches
on:
  push:
    branches: [main, 'v[0-9]+.x']
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiga-family/ci/actions/auto/cleanup-cache@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        if: github.event_name == 'push'
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
      - uses: taiga-family/ci/actions/auto/cleanup-cache@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        if: github.event_name == 'pull_request'
        with:
          branch-name: refs/pull/${{ github.event.pull_request.number }}/merge
