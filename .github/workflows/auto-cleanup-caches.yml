name: 🤖 Auto cleanup caches
on:
  push:
    branches: [main, 'v[0-9]+.x']
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/auto/cleanup-cache@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
        if: github.event_name == 'push'
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
      - uses: taiga-family/ci/actions/auto/cleanup-cache@3e1b1fc507d59ea30da7e951ae5d47e42f529586 # v1.194.0
        if: github.event_name == 'pull_request'
        with:
          branch-name: refs/pull/${{ github.event.pull_request.number }}/merge
